name: x86_64-apple-darwin

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git tag / branch / commit
        required: true
        default: n8.1

jobs:
  build:
    uses: ./.github/workflows/reusable-build-audio-target.yml
    with:
      ffmpeg_ref: ${{ inputs.ffmpeg_ref }}
      target_triple: x86_64-apple-darwin
      target_os_family: darwin
      target_ffmpeg_arch: x86_64
      target_ffmpeg_os: darwin
      runner_label: macos-15-intel
      macos_deployment_target: "11.0"
